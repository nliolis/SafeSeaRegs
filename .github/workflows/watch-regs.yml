name: Watch NOAA regs
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
  issues: write
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check the Federal Register
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SMS_TO: ${{ secrets.SMS_TO }}
        run: python3 watcher.py
      - name: Remember what we've seen
        run: |
          git config user.name "safesea-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/processed.json || true
          git commit -m "watcher: update seen-list" || echo "nothing to commit"
          git push || echo "nothing to push"
